name: group-collect

# 매일 1회 프리컴퓨트 그룹 '데이터 수집'(LLM 없음): 뉴스/공시/증권사리포트/변동성.
# 요약은 모바일에서 사용자별 AI가 수행(get_*_report). 수집키(DART/FRED/ECOS)는
# admin_get_collect_key로 자동 조회하므로 GitHub Secret은 ADMIN_TOKEN 하나면 된다.
on:
  schedule:
    - cron: "0 22 * * *"   # 07:00 KST (UTC+9)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run group collector
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: python group_collect.py
